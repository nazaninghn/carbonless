name: CI

on:
  push:
  pull_request:

env:
  ALLOW_DEV_SECRET: 'true'
  DEBUG: 'true'

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: carbonless_backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python manage.py test emissions accounts questionnaire companies

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus_insights-saas-neon_nextjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
